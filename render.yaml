services:
  - type: web
    name: bayes-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
    healthCheckPath: /health
